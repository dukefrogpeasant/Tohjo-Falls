                            <font size="6" face="Arial Rounded MT Bold, Comic Sans MS, Andy"><strong>Color Split tool</strong></font>
<p>This tool splits every single color in a image into separate layers. For rather obvious reasons, i'm not accepting jpegs. For now, this only accepts GIF and PNGs.</p>
<input type="file" id="upload" accept="image/png,image/gif">
<br><br>

<div id="layers"></div>

<script>
const upload = document.getElementById('upload');
const layersDiv = document.getElementById('layers');

upload.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    splitColors(img);
  };
});

function splitColors(img) {
  layersDiv.innerHTML = "";

  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');

  tempCanvas.width = img.width;
  tempCanvas.height = img.height;

  tempCtx.drawImage(img, 0, 0);

  const imageData = tempCtx.getImageData(0, 0, img.width, img.height);
  const data = imageData.data;

  const colorMap = new Map();

  // collects each single color, except trans pixels
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];
    const a = data[i + 3];

    if (a === 0) continue;

    const key = `${r},${g},${b},${a}`;
    if (!colorMap.has(key)) {
      colorMap.set(key, []);
    }

    colorMap.get(key).push(i);
  }

  // creates canvas and does label for layrcolors :3 hello if youre reading
  colorMap.forEach((pixels, colorKey) => {
    const [r, g, b, a] = colorKey.split(',').map(Number);

    const layerCanvas = document.createElement('canvas');
    layerCanvas.width = img.width;
    layerCanvas.height = img.height;

    const layerCtx = layerCanvas.getContext('2d');
    const layerImageData = layerCtx.createImageData(img.width, img.height);
    const layerData = layerImageData.data;

    pixels.forEach(index => {
      layerData[index] = r;
      layerData[index + 1] = g;
      layerData[index + 2] = b;
      layerData[index + 3] = a;
    });

    layerCtx.putImageData(layerImageData, 0, 0);

    const wrapper = document.createElement('div');
    wrapper.className = "layer";

    const label = document.createElement('div');
    label.textContent = `Color:(R:${r}, G:${g}, B:${b}, Alpha:${a})`;

    wrapper.appendChild(label);
    wrapper.appendChild(layerCanvas);

    layersDiv.appendChild(wrapper);
  });
}
</script>
