  <meta name="Description" content="Are you ready? Come to The Tohjo Falls!">

  <style>

      margin-top: 20px;
      background: #FFFFFF;
      image-rendering: pixelated;
    }

    input[type=range] {
      width: 300px;
    }
  </style>

<body topmargin="5" leftmargin="0" rightmargin="0" bottommargin="2">

  <table align="center" width="779" border="0" cellspacing="0" cellpadding="0">
    </head>

    <tr>
      <td><img src="./Visual/header/banner.png"></td>
    </tr>

  </table>

  <table width="779" align="center" cellspacing="0" cellpadding="0" border="0">
    <tr>
      <td bgcolor="#9C97EB" width="141" valign="top"
        style="border-left: 1 solid #000000; border-bottom: 1 solid #000000; border-right: 1 solid #000000;">
        <div id="left-sidebar"></div>
      </td>

      <td align="left" background="/web/20030228113837im_/http://tf.pokemonsky.com/pics/ra2md_05.jpg" valign="top"
        width="94%" bgcolor="#72A0D1">
        <table border="0" cellpadding="0" cellspacing="6" width="100%">
          <tbody>
            <tr>
              <td align="left" valign="top" width="100%">
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tbody>
                    <tr>
                      <td width="100%">
                        <font color="black">






                          <p align="right">
                            <font size="6" face="Arial Rounded MT Bold, Comic Sans MS, Andy"><strong>Image rotating
                                tool</strong></font>
                          <p>This tool rotates images! This does not create transparent pixels, resize the canvas or add
                            new colors.</p>

                          <input type="file" id="upload" accept="image/png,image/jpeg"><br><br>

                          <label>Angle:
                            <input type="range" id="angle" min="0" max="360" value="0">
                          </label>
                          <span id="angleValue">0°</span>

                          <br>
                          <canvas id="canvas"></canvas>

                          <script>
                            const upload = document.getElementById('upload');
                            const canvas = document.getElementById('canvas');
                            const ctx = canvas.getContext('2d');
                            ctx.imageSmoothingEnabled = false;

                            const angleSlider = document.getElementById('angle');
                            const angleValue = document.getElementById('angleValue');

                            let originalImageData = null;
                            let originalWidth = 0;
                            let originalHeight = 0;

                            upload.addEventListener('change', function (e) {
                              const file = e.target.files[0];
                              if (!file) return;

                              const img = new Image();
                              img.src = URL.createObjectURL(file);

                              img.onload = () => {
                                originalWidth = img.width;
                                originalHeight = img.height;

                                canvas.width = img.width;
                                canvas.height = img.height;

                                ctx.clearRect(0, 0, canvas.width, canvas.height);
                                ctx.drawImage(img, 0, 0);

                                originalImageData = ctx.getImageData(0, 0, img.width, img.height);
                              };
                            });

                            angleSlider.addEventListener('input', function () {
                              angleValue.textContent = angleSlider.value + "°";
                              if (!originalImageData) return;
                              rotateNearest(parseFloat(angleSlider.value));
                            });

                            function rotateNearest(angleDegrees) {
                              const angle = angleDegrees * Math.PI / 180;

                              const cos = Math.cos(angle);
                              const sin = Math.sin(angle);

                              const width = originalWidth;
                              const height = originalHeight;

                              canvas.width = width;
                              canvas.height = height;

                              const output = ctx.createImageData(width, height);
                              const outData = output.data;
                              const srcData = originalImageData.data;

                              const cx = width / 2;
                              const cy = height / 2;

                              for (let y = 0; y < height; y++) {
                                for (let x = 0; x < width; x++) {

                                  // Translate to center
                                  const dx = x - cx;
                                  const dy = y - cy;

                                  // Reverse rotate
                                  const srcX = Math.round(dx * cos + dy * sin + cx);
                                  const srcY = Math.round(-dx * sin + dy * cos + cy);

                                  const destIndex = (y * width + x) * 4;

                                  if (
                                    srcX >= 0 &&
                                    srcX < width &&
                                    srcY >= 0 &&
                                    srcY < height
                                  ) {
                                    const srcIndex = (srcY * width + srcX) * 4;

                                    outData[destIndex] = srcData[srcIndex];
                                    outData[destIndex + 1] = srcData[srcIndex + 1];
                                    outData[destIndex + 2] = srcData[srcIndex + 2];
                                    outData[destIndex + 3] = srcData[srcIndex + 3];
                                  } else {
                                    // Transparent background
                                    outData[destIndex + 3] = 0;
                                  }
                                }
                              }

                              ctx.putImageData(output, 0, 0);
                            }
                          </script>

                          </center>
                        </font>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </td>
            </tr>
            <tr>
              <td align="left" valign="top" width="100%"></td>
            </tr>

        </div>
      </td>

</body>
