                          <p align="right">
                            <font size="6" face="Arial Rounded MT Bold, Comic Sans MS, Andy"><strong>Outline Adder tool tool</strong></font>
<p>This tool adds a 1 pixel (1 PX) outline to your image at places where a non-fully transparent pixel (alpha not 0) hits a transparent pixel (alpha 0). This does NOT rescale the image, and is ran LOCALLY in your browser. You can pick the outline color by yourself!.</p>

<input type="file" id="upload" accept="image/png">
<input type="color" id="colorPicker" value="#000000">

<br><br>

<button onclick="generateOutline()">Transparent Outline (Original)</button>
<button onclick="blackBorder()">Black Border Pixels</button>
<button onclick="darkenBorder()">Darken Border 50%</button>

<br>
<canvas id="canvas"></canvas>

<script>
let img = new Image();

document.getElementById('upload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  img.src = URL.createObjectURL(file);
  img.onload = () => {
    const canvas = document.getElementById('canvas');
    canvas.width = img.width;
    canvas.height = img.height;

    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
  };
});

function getAlpha(data, width, height, x, y){
  if (x < 0 || y < 0 || x >= width || y >= height) return 0;
  return data[(y * width + x) * 4 + 3];
}

function hasTransparentNeighbor(data,width,height,x,y){
  return (
    getAlpha(data,width,height,x+1,y) === 0 ||
    getAlpha(data,width,height,x-1,y) === 0 ||
    getAlpha(data,width,height,x,y+1) === 0 ||
    getAlpha(data,width,height,x,y-1) === 0
  );
}

function hasSolidNeighbor(data,width,height,x,y){
  return (
    getAlpha(data,width,height,x+1,y) > 0 ||
    getAlpha(data,width,height,x-1,y) > 0 ||
    getAlpha(data,width,height,x,y+1) > 0 ||
    getAlpha(data,width,height,x,y-1) > 0
  );
}

/* ORIGINAL TOOL */
function generateOutline(){

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);

  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = imageData.data;
  const width = canvas.width;
  const height = canvas.height;

  const outlineColor = hexToRgb(document.getElementById('colorPicker').value);

  const outlineData = ctx.createImageData(width,height);
  const odata = outlineData.data;

  for(let y=0;y<height;y++){
    for(let x=0;x<width;x++){

      const index = (y*width+x)*4;

      if(data[index+3]===0){

        if(hasSolidNeighbor(data,width,height,x,y)){
          odata[index]   = outlineColor.r;
          odata[index+1] = outlineColor.g;
          odata[index+2] = outlineColor.b;
          odata[index+3] = 255;
        }

      }
    }
  }

  ctx.putImageData(outlineData,0,0);
  ctx.drawImage(img,0,0);
}

/* BLACK BORDER TOOL */
function blackBorder(){

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);

  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = imageData.data;
  const width = canvas.width;
  const height = canvas.height;

  for(let y=0;y<height;y++){
    for(let x=0;x<width;x++){

      const index=(y*width+x)*4;

      if(data[index+3] > 0){

        if(hasTransparentNeighbor(data,width,height,x,y)){
          data[index]=0;
          data[index+1]=0;
          data[index+2]=0;
        }

      }

    }
  }

  ctx.putImageData(imageData,0,0);
}

/* DARKEN BORDER TOOL */
function darkenBorder(){

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);

  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = imageData.data;
  const width = canvas.width;
  const height = canvas.height;

  for(let y=0;y<height;y++){
    for(let x=0;x<width;x++){

      const index=(y*width+x)*4;

      if(data[index+3] > 0){

        if(hasTransparentNeighbor(data,width,height,x,y)){
          data[index]   = data[index]*0.5;
          data[index+1] = data[index+1]*0.5;
          data[index+2] = data[index+2]*0.5;
        }

      }

    }
  }

  ctx.putImageData(imageData,0,0);
}

function hexToRgb(hex){
  const bigint=parseInt(hex.slice(1),16);
  return {
    r:(bigint>>16)&255,
    g:(bigint>>8)&255,
    b:bigint&255
  };
}
</script>
